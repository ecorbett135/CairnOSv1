version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:testing

  - package-ecosystem: pip
    directory: /cairn/interfaces
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:testing

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:testing
