name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - alpha

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check whitespace
        run: git diff --check

      - name: Compile Python modules
        run: python -m compileall -q dev.py cairn build_topo

      - name: Run scenario smoke test
        run: python dev.py

      - name: Run test suite
        run: python -m pytest cairn/tests -q
