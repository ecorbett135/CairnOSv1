<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">CairnOS primary logo concept</title>
  <desc id="desc">A CairnOS logo concept using the Hiker Logix blue palette with a cairn, contour line, and mountain badge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f78a8"/>
      <stop offset="1" stop-color="#4a86ad"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b2dff5"/>
      <stop offset="1" stop-color="#98c8e8"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="600" cy="198" r="112"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#175277" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 0h1200v675H0z" fill="#ffffff" opacity="0"/>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="198" r="112" fill="url(#badge)"/>
    <g clip-path="url(#badgeClip)">
      <path d="M462 291 530 185l44 57 48-93 116 142H462z" fill="#2f719d"/>
      <path d="M520 295c42-50 96-72 159-12" fill="none" stroke="#2f719d" stroke-width="8" stroke-linecap="round"/>
      <path d="M487 268c43-23 72-65 112-50 36 13 49 68 91 54 23-8 42-8 65 4v45H487z" fill="#98c8e8"/>
      <path d="M537 287c41-45 83-60 127-4" fill="none" stroke="#2f719d" stroke-width="6" stroke-linecap="round"/>

      <g transform="translate(600 202)">
        <path d="M-42 54c23-14 62-14 84 0 7 4 4 13-5 15-25 7-49 7-74 0-9-2-12-11-5-15z" fill="#2a668f"/>
        <path d="M-32 31c18-10 47-10 64 0 7 4 5 13-3 15-19 5-39 5-58 0-8-2-10-11-3-15z" fill="#3379a5"/>
        <path d="M-24 10c14-8 35-8 48 0 6 4 5 12-2 14-15 4-29 4-44 0-7-2-8-10-2-14z" fill="#2a668f"/>
        <path d="M-16-8c10-7 23-7 32 0 5 3 4 10-1 12-10 3-20 3-30 0-5-2-6-9-1-12z" fill="#3379a5"/>
        <path d="M-8-23c5-5 12-5 16 0 4 4 2 10-2 12-4 2-8 2-12 0-4-2-6-8-2-12z" fill="#2a668f"/>
      </g>

      <path d="M523 241c35 13 71 13 107 0" fill="none" stroke="#b2dff5" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
      <path d="M548 260c35 9 70 9 104-1" fill="none" stroke="#b2dff5" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    </g>
  </g>

  <text x="600" y="433" text-anchor="middle" font-family="Avenir Next, Montserrat, Helvetica Neue, Arial, sans-serif" font-size="92" font-weight="900" letter-spacing="2">
    <tspan fill="#f8fafc">CAIRN</tspan><tspan fill="#b2dff5">OS</tspan>
  </text>
  <text x="600" y="489" text-anchor="middle" font-family="Avenir Next, Montserrat, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="8" fill="#b2dff5">
    EXPEDITION PLANNING ENGINE
  </text>
</svg>
